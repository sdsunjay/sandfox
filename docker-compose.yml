services:
  sandfox:
    build: .
    environment:
      - DISPLAY=host.docker.internal:0
      - PULSE_SERVER=tcp:host.docker.internal:4713
      - LIBGL_ALWAYS_SOFTWARE=1
      - MOZ_ENABLE_WAYLAND=0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # --- Security hardening ---
    security_opt:
      - no-new-privileges:true
      - seccomp:unconfined    # Firefox sandbox needs clone/unshare syscalls
    cap_drop:
      - ALL
    cap_add:
      - SYS_CHROOT           # needed by Firefox sandbox
      - SYS_ADMIN            # needed for user namespace (content sandbox)
    read_only: true
    tmpfs:
      - /tmp:size=256m
      - /run:size=64m
      - /home/firefox/.cache:size=128m,uid=999,gid=999
      - /home/firefox/.mozilla:size=256m,uid=999,gid=999  # Firefox profile
      - /home/firefox/.config:size=8m,uid=999,gid=999    # PulseAudio client config
      - /dev/shm:size=256m   # Firefox shared memory
    shm_size: "256m"
    # Limit resources
    deploy:
      resources:
        limits:
          cpus: "6.0"
          memory: 6g
