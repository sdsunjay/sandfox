# Sandfox — hardened, disposable Firefox sandbox
# IMPORTANT: Use `bash run.sh start` to launch. Do not run `docker compose up`
# directly — run.sh generates required auth files (X11 cookie, PulseAudio cookie)
# and configures network egress filtering.

services:
  sandfox:
    build: .
    environment:
      - DISPLAY=host.docker.internal:0
      - PULSE_SERVER=tcp:host.docker.internal:4713
      - LIBGL_ALWAYS_SOFTWARE=1
      - MOZ_ENABLE_WAYLAND=0
      - XAUTHORITY=/home/firefox/.Xauthority
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # X11 auth cookie — generated by run.sh (replaces xhost +localhost)
      - ${HOME}/.config/sandfox/xauth:/home/firefox/.Xauthority:ro
      # PulseAudio auth cookie — generated by run.sh (replaces anonymous TCP)
      - ${HOME}/.config/sandfox/pulse-cookie:/home/firefox/.pulse-cookie:ro

    # --- Security hardening ---
    security_opt:
      - no-new-privileges:true
      # Custom seccomp profile: default-deny with Firefox-required syscalls only.
      # Blocks io_uring, syslog, name_to_handle_at, and other exploit/escape vectors.
      - seccomp:./seccomp-firefox.json
    cap_drop:
      - ALL
    cap_add:
      - SYS_CHROOT           # needed by Firefox content sandbox
      # SYS_ADMIN intentionally omitted — Firefox uses unprivileged user namespaces
      # instead. If Firefox's sandbox fails, the container is the sandbox boundary.
    read_only: true

    # Volatile tmpfs mounts — destroyed when container stops.
    # noexec prevents dropped binaries from executing; nosuid/nodev harden further.
    tmpfs:
      - /tmp:size=256m,noexec,nosuid,nodev
      - /run:size=64m,noexec,nosuid,nodev
      - /home/firefox/.cache:size=128m,uid=999,gid=999,noexec,nosuid,nodev
      - /home/firefox/.mozilla:size=256m,uid=999,gid=999,nosuid,nodev
      - /home/firefox/.config:size=8m,uid=999,gid=999,noexec,nosuid,nodev
      - /dev/shm:size=256m,noexec,nosuid,nodev
    shm_size: "256m"

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: "6.0"
          memory: 6g
          pids: 512             # prevent fork bombs
    ulimits:
      nofile:
        soft: 4096
        hard: 8192
      core:
        soft: 0               # disable core dumps — prevent memory content leaks
        hard: 0

    # Detect hung Firefox process
    healthcheck:
      test: ["CMD-SHELL", "test -d /proc/1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
